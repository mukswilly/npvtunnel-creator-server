# Release workflow for npvtunnel-creator-server.
#
# Trigger: push a semver tag (e.g. v0.1.0). Produces signed multi-arch
# binaries + a signed multi-arch container image. No manual secrets required —
# cosign uses keyless OIDC and the image is pushed with the built-in
# GITHUB_TOKEN.
name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create the GitHub release
  packages: write   # push to ghcr.io
  id-token: write   # cosign keyless signing (OIDC)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - uses: sigstore/cosign-installer@v3

      - name: Release binaries (goreleaser)
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---- Container image: multi-arch, pushed to GHCR, signed ----
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/mukswilly/npvtunnel-creator-server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}

      - name: Sign image (keyless)
        env:
          COSIGN_YES: "true"
        run: cosign sign ghcr.io/mukswilly/npvtunnel-creator-server@${{ steps.build.outputs.digest }}
